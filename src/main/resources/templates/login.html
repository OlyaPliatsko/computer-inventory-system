<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Computer Inventory System</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <h2>WELCOME BACK :)</h2>

        <form class="auth-form" th:action="@{/login}" method="post">
            <div class="input-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div class="auth-extra">
                <a href="#">FORGOT PASSWORD</a>
            </div>

            <button type="submit" class="auth-btn">LOGIN</button>

            <p class="field-error" th:if="${param.error}">
                Invalid email or password.
            </p>

            <p class="field-success" th:if="${param.logout}">
                You have been logged out.
            </p>
        </form>

        <div class="divider">
            <span>OR LOGIN WITH</span>
        </div>

        <div class="social-login">
            <img src="/images/facebook.png" alt="Facebook">
            <img src="/images/gmail.png" alt="Google">
            <img src="/images/apple.png" alt="Apple">
        </div>

        <div class="auth-switch">
            <p>DON'T HAVE ACCOUNT? <a href="/register">Sign Up</a></p>
        </div>
    </div>
</div>

</body>
</html>
