<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Computer Inventory System</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <h2>WELCOME :)</h2>

        <form class="auth-form" th:action="@{/register}" th:object="${user}" method="post">
            <div class="input-group">
                <input type="text" th:field="*{name}" placeholder="Name" required>
            </div>
            <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>

            <div class="input-group">
                <input type="email" th:field="*{email}" placeholder="Email" required>
            </div>
            <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            <p class="field-error" th:if="${emailError}" th:text="${emailError}"></p>

            <div class="input-group">
                <input type="password" th:field="*{password}" placeholder="Password" required>
            </div>
            <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

            <div class="input-group">
                <input type="password" th:field="*{confirmPassword}" placeholder="Confirm Password" required>
            </div>
            <p class="field-error" th:if="${passwordError}" th:text="${passwordError}"></p>

            <button type="submit" class="auth-btn">SIGN UP</button>
        </form>

        <div class="divider">
            <span>OR SIGN UP WITH</span>
        </div>

        <div class="social-login">
            <img src="/images/facebook.png" alt="Facebook">
            <img src="/images/gmail.png" alt="Google">
            <img src="/images/apple.png" alt="Apple">
        </div>

        <div class="auth-switch">
            <p>ALREADY HAVE ACCOUNT? <a href="/login">Sign In</a></p>
        </div>
    </div>
</div>

</body>
</html>
